<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRATION DOC</title>
</head>
<body>
    <div class="header">
        <h4>registration form</h4>
    </div>
    <div class="content">
         <div class="registration form">
            <form action="practical3.html">
                <fieldset>
                    <legend>details</legend>
                    <p>
                        <label for="name">Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </p>
                    <p>
                        <label for="email">Email</label>
                        <input type="email" placeholder="Enter your email" required>
                    </p>
                    <p>
                        <label for="enrollID">Enroll ID</label>
                        <input type="text" placeholder="Enter enrollment ID" required>
                    </p>
                    <p>
                        <label for="phn_no">phn no</label>
                        <input type="text" placeholder="Enter your phone number" required>
                    </p>
                    <p>
                        <label for="dob">Date of birth</label>
                        <input type="date" name="dob" id="dob" required>
                    </p>
                    <p>
                        <label for="name">Address</label>
                       <textarea name="address" id="address" required>Enter your address</textarea>
                    </p>
                    <p>
                        <label for="gender">Gender</label>
                        <input type="radio" name="gender" id="male" required>Male
                        <input type="radio" name="gender" id="female" required>Female
                    </p>
                    <P>
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </P>
                    
                </fieldset>
            </form>
         </div>
    </div>
    <div class="footer">
        <p>
            &copy;2026 harsh
        </p>
    </div>
</body>
</html>
